<!DOCTYPE html>
<html lang="ru"> 
<head>
    <meta charset = "UTF-8">
    <title>🚀 bezt-CodeBlock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="puzzle.ico">
</head>
<body>
    <header>
        <h1>🚀 bezt-CodeBlock</h1>
    </header>
    <div class="layout">
        <div class="left-blocks-panel">

            <div class="tabs">
            <button class="tab active" data-panel="management">Управление</button>
            <button class="tab" data-panel="operators">Операторы</button>
            </div>

            <div class="panel-container">
                <div class = "panel active" id="management">
                    <h3>Блоки</h3>

                    <div class="block" data-type="declare">
                        <div>Объявить</div>
                        <div class="window">
                            <input class="var-name" value="" placeholder="Имя" type="string">
                            <input class="var-value" value="" placeholder="Выражение">
                        </div>
                    </div>

                    <div class="block" data-type="set">
                        <div>Установить</div>
                        <div class="window">
                            <input class="var-name" value="" placeholder="Имя" type="string">
                            <input class="var-value" value="" placeholder="Выражение">
                        </div>
                    </div>

                    <div class="block" data-type="print" style="height: 70px;">
                        <div>Вывести</div>
                        <input class="var-name" value="" style="margin-top: 8px;" placeholder="имя" type="string">
                    </div>

                    <div class="block" data-type="if" >
                        <div>ЕСЛИ</div>
                        <div class="window">
                            <input class="if-expression" placeholder="пример: (a > 5 AND b < 10) OR NOT c == 0" style="width: 180px;">  
                        </div>
                    </div>

                    <div class="block" data-type="endif">
                        <div>КОНЕЦ ЕСЛИ</div>
                    </div>

                    <div class="block" data-type="else">
                        <div>ИНАЧЕ</div>
                    </div>

                    <div class="block" data-type="endelse">
                        <div>КОНЕЦ ИНАЧЕ</div>
                    </div>

                    <div class="block" data-type="while">
                        <div>ПОКА</div>
                        <div class="window">
                            <input class="while-expression" placeholder="пример: a < 10 AND (b != 0)" style="width: 180px;">
                        </div>
                    </div>

                    <div class="block" data-type="endwhile">
                        <div>КОНЕЦ ЦИКЛА</div>
                    </div>

                    <div class="block" data-type="for">
                        <div>ДЛЯ</div>
                        <div class="window">
                            <input class="for-init" placeholder="i = 0" type="text">
                            <input class="for-condition" placeholder="i < 10" type="text">
                            <input class="for-increment" placeholder="i++" type="text">
                        </div>
                    </div>
                    
                    <div class="block" data-type="array">
                        <div>Объявление массива</div>
                        <div class="window">
                            <input class = "name" value="" placeholder="Имя" type="string">
                            <input class="size" value="" placeholder="Размер">
                        </div>
                    </div>

                    <div class="block" data-type="index-declare">
                        <div>Установить значение</div>
                        <div class="window">
                            <input class = "name" style =" width:30px;" value="" placeholder="Имя" type="string">
                            <span class = "square" style = "font-size: 15px">[</span>
                            <input class="index" style =" width:30px;"value="" placeholder="Индекс" >
                            <span class = "square" style = "font-size: 15px">]</span>
                            <span class = "equal" style = "font-size: 15px">=</span>
                            <input class="value" style =" width:30px;"value="" placeholder="Значение">
                        </div>
                    </div>

                    <div class="block" data-type="index-take">
                        <div>Забрать значение</div>
                        <div class="window">
                            <input class = "name" style =" width:30px;" value="" placeholder="Переменная" type="string">
                            <span class = "equal" style = "font-size: 15px">=</span>
                            <input class="value" style =" width:30px;"value="" placeholder="Имя" type="string">
                            <span class = "square" style = "font-size: 15px">[</span>
                            <input class="index" style =" width:30px;"value="" placeholder="Индекс">
                            <span class = "square" style = "font-size: 15px">]</span>
                        </div>  
                    </div>
                    <div class="block" data-type="function">
                    <div>ФУНКЦИЯ</div>
                        <div class="window">
                            <input class="func-name" placeholder="имя функции" type="string">
                        </div>
                    </div>

                    <div class="block" data-type="endfunction">
                        <div>КОНЕЦ ФУНКЦИИ</div>
                    </div>

                    <div class="block" data-type="call">
                        <div>ВЫЗОВ ФУНКЦИИ</div>
                            <div class="window">
                                <input class="func-name" placeholder="имя функции" type="string">
                            </div>
                        </div>
                    </div>
                
                <div class = "panel" id="operators">
                    <h3>Блоки</h3>
                    <div class = "block ariphm plus" data-type="plus">
                        <input type = "text" placeholder = "имя"/>
                        <div class= "text" style = "font-size: 20px">+</div>
                        <input type = "text" placeholder = "имя"/>
                    </div>

                    <div class = "block ariphm minus" data-type="minus">
                        <input type = "text" placeholder = "имя"/>
                        <div class= "text" style = "font-size: 20px">-</div>
                        <input type = "text" placeholder = "имя"/>
                    </div>

                    <div class = "block ariphm prod" data-type="prod">
                        <input type = "text" placeholder = "имя"/>
                        <div class= "text" style = "font-size: 20px">*</div>
                        <input type = "text" placeholder = "имя"/>
                    </div>

                    <div class = "block ariphm division" data-type="division">
                        <input type = "text" placeholder = "имя"/>
                        <div class= "text" style = "font-size: 20px">/</div>
                        <input type = "text" placeholder = "имя"/>
                    </div>

                    <div class = "block ariphm remains" data-type="remains">
                        <input type = "text" placeholder = "имя"/>
                        <div class= "text" style = "font-size: 20px">%</div>
                        <input type = "text" placeholder = "имя"/>
                    </div>

                    <div class="block-bracket right">
                        <div class="circle">
                             <span class="circle-text">)</span>
                        </div>
                    </div>

                    <div class="block-bracket left">
                        <div class="circle">
                             <span class="circle-text">(</span>
                        </div>
                    </div>

                </div>
            </div>
        </div> 

        <div class = "dotted" id = "WorkspaceArea">
            <div class="unselectable">Перетащи сюда блоки</div>
        </div>
        <div class = "button-container">
            <button id="runButton">▶  Запустить</button>
            <button id="removebutton"> ❌ Очистить </button>
             <div id="output">Готов к выполнению кода!</div>
        </div> 
        
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
